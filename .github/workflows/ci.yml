name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows-far3:
    name: Build & Check (Windows, far3)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Run check
      run: cargo check --all-targets
      
    - name: Run clippy
      run: cargo clippy --all-targets -- -D warnings
      
    - name: Run tests
      run: cargo test
      
    - name: Build and package release
      run: .\build_release.ps1
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: far1c-windows-x64
        path: target/release/far3/
        retention-days: 14

  build-linux-far2:
    name: Build & Check (Linux, far2)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Run check
      run: cargo check --no-default-features --features far2 --all-targets
      
    - name: Run clippy
      run: cargo clippy --no-default-features --features far2 --all-targets -- -D warnings
      
    - name: Run tests
      run: cargo test --no-default-features --features far2
      
    - name: Build and package release
      run: bash ./build_release.sh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: far1c-linux-x64
        path: target/release/far2/
        retention-days: 14
